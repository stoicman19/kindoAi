<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KindoAI - Career & Chat Intelligence Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        
        .glow-border {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1px;
            border-radius: 8px;
        }
        
        .transition-smooth {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }
        
        @keyframes streamPulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        .streaming { animation: streamPulse 1.5s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #171717; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #505050; }

        .markdown-content h1 { font-size: 1.875rem; font-weight: bold; margin: 1rem 0 0.5rem; color: #667eea; }
        .markdown-content h2 { font-size: 1.5rem; font-weight: bold; margin: 0.875rem 0 0.5rem; color: #667eea; }
        .markdown-content h3 { font-size: 1.25rem; font-weight: bold; margin: 0.75rem 0 0.5rem; }
        .markdown-content p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-content ul, .markdown-content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-content li { margin-bottom: 0.25rem; }
        .markdown-content code { background: #252525; padding: 0.125rem 0.375rem; border-radius: 4px; font-family: 'Courier New', monospace; color: #a0d995; }
        .markdown-content pre { background: #252525; padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 0.75rem; }
        .markdown-content strong { font-weight: bold; }
        .markdown-content em { font-style: italic; }
    </style>
</head>
<body class="bg-[#0B0B0C] text-gray-100">
    <div class="flex h-screen overflow-hidden">
        <!-- LEFT SIDEBAR (ChatGPT Style) -->
        <div class="w-64 bg-[#171717] border-r border-[#303030] flex flex-col">
            <!-- Header -->
            <div class="p-4 border-b border-[#303030]">
                <button id="newChatBtn" class="w-full py-2.5 px-4 rounded-lg bg-[#404040] hover:bg-[#505050] text-white transition-smooth flex items-center justify-center gap-2 font-medium">
                    <i class="fas fa-plus"></i>
                    New Chat
                </button>
            </div>
            
            <!-- Menu Toggle -->
            <div class="p-4 border-b border-[#303030]">
                <div class="text-xs text-gray-400 font-semibold mb-3">MODE</div>
                <div class="flex flex-col gap-2">
                    <button class="mode-toggle px-3 py-2 rounded-lg text-sm bg-[#667eea] text-white transition-smooth" data-mode="general">
                        <i class="fas fa-comments mr-2"></i>General Chat AI
                    </button>
                    <button class="mode-toggle px-3 py-2 rounded-lg text-sm bg-[#404040] hover:bg-[#505050] transition-smooth" data-mode="career">
                        <i class="fas fa-briefcase mr-2"></i>Career AI Engine
                    </button>
                </div>
            </div>
            
            <!-- Chat History (Placeholder) -->
            <div class="flex-1 overflow-y-auto p-4">
                <div class="text-xs text-gray-500 text-center py-8">
                    <i class="fas fa-inbox block mb-2"></i>
                    No conversations yet
                </div>
            </div>
            
            <!-- Bottom Profile -->
            <div class="p-4 border-t border-[#303030]">
                <div class="flex items-center gap-3 p-3 rounded-lg bg-[#252525] hover:bg-[#303030] cursor-pointer transition-smooth">
                    <div class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0">
                        <img id="profileImg" src="https://api.dicebear.com/7.x/avataaars/svg?seed=KindoAI" alt="KindoAI" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xs font-semibold text-gray-100" id="profileName">KindoAI Engine</div>
                        <div class="text-xs text-gray-500">Free Tier</div>
                    </div>
                    <button data-action="logout" class="text-xs text-gray-500 hover:text-gray-300 transition-smooth">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- MAIN CONTENT AREA (Gemini Style) -->
        <div class="flex-1 flex flex-col">
            <!-- Top Header Bar -->
            <div class="bg-[#0B0B0C] border-b border-[#303030] px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-brain text-[#667eea] text-2xl"></i>
                        <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#667eea] to-[#764ba2]">KindoAI</h1>
                    </div>
                    
                    <!-- Engine Selector -->
                    <div class="glow-border">
                        <select id="engineSelector" class="bg-[#1a1a1b] text-white px-4 py-2 rounded-lg focus:outline-none text-sm font-medium cursor-pointer">
                            <option value="groq">⚡ Groq Cloud (Fastest)</option>
                            <option value="gemini">✨ Google Gemini Flash</option>
                            <option value="openrouter">🔀 OpenRouter Hub</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Main Content Area -->
            <div class="flex-1 overflow-y-auto">
                <!-- Engine Info Panel -->
                <div id="engineInfoPanel" class="px-6 py-6 max-w-5xl mx-auto w-full"></div>

                <!-- Chat Display Area -->
                <div id="chatContainer" class="px-6 py-8 max-w-4xl mx-auto w-full markdown-content">
                    <div class="text-center py-16">
                        <i class="fas fa-comments text-5xl text-[#667eea] mb-4"></i>
                        <h3 class="text-xl font-semibold text-white mb-2">Welcome to KindoAI</h3>
                        <p class="text-gray-400">Ask me anything or switch to Career AI mode</p>
                    </div>
                </div>
                
                <!-- Career AI Dual Input (Hidden by default) -->
                <div id="careerPanel" class="hidden px-6 py-8 max-w-5xl mx-auto w-full">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        <!-- Resume Input -->
                        <div>
                            <label class="text-xs font-semibold text-gray-300 mb-3 block">Paste Raw Resume Text</label>
                            <textarea id="resumeInput" placeholder="Paste your complete resume here..." class="w-full h-48 bg-[#1a1a1b] border border-[#303030] rounded-lg p-4 text-sm text-gray-100 input-glow resize-none focus:border-[#667eea] transition-smooth"></textarea>
                            <div class="text-xs text-gray-500 mt-2">
                                <i class="fas fa-info-circle mr-1"></i>Max 5000 characters
                            </div>
                        </div>
                        
                        <!-- Job Description Input -->
                        <div>
                            <label class="text-xs font-semibold text-gray-300 mb-3 block">Paste Job Target Details</label>
                            <textarea id="jobInput" placeholder="Paste the job description here..." class="w-full h-48 bg-[#1a1a1b] border border-[#303030] rounded-lg p-4 text-sm text-gray-100 input-glow resize-none focus:border-[#667eea] transition-smooth"></textarea>
                            <div class="text-xs text-gray-500 mt-2">
                                <i class="fas fa-info-circle mr-1"></i>Max 5000 characters
                            </div>
                        </div>
                    </div>
                    
                    <!-- Quota Tracker -->
                    <div class="bg-[#1a1a1b] border border-[#303030] rounded-lg p-4 mb-6">
                        <div class="text-xs font-semibold text-gray-300 mb-3">API Quota Status</div>
                        <div id="quotaIndicator" class="w-full bg-[#303030] rounded-full h-2 overflow-hidden">
                            <div id="quotaBar" class="bg-gradient-to-r from-[#667eea] to-[#764ba2] h-full" style="width: 100%;"></div>
                        </div>
                        <div id="quotaText" class="text-xs text-gray-400 mt-2">Quota: Loading...</div>
                    </div>

                    <!-- Submit Button -->
                    <button data-action="career-submit" disabled class="w-full bg-gradient-to-r from-[#667eea] to-[#764ba2] text-white font-semibold py-3 rounded-lg hover:opacity-90 transition-smooth disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-magic mr-2"></i>Analyze & Optimize
                    </button>
                </div>
            </div>
            
            <!-- Bottom Input Box (Always visible) -->
            <div class="bg-[#0B0B0C] border-t border-[#303030] px-6 py-6">
                <div class="max-w-4xl mx-auto flex gap-3 items-end">
                    <div class="flex-1 relative">
                        <div class="glow-border">
                            <div class="bg-[#1a1a1b] rounded-full px-6 py-3 flex items-center gap-3">
                                <button id="attachBtn" class="text-gray-400 hover:text-[#667eea] transition-smooth">
                                    <i class="fas fa-paperclip text-lg"></i>
                                </button>
                                <input id="messageInput" type="text" placeholder="Ask KindoAI anything..." class="flex-1 bg-transparent text-white placeholder-gray-600 focus:outline-none text-sm">
                                <button id="sendBtn" class="text-[#667eea] hover:text-[#764ba2] transition-smooth disabled:opacity-50">
                                    <i class="fas fa-arrow-up text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="scripts/config/limits.js"></script>
    <script src="scripts/quotaTracker.js"></script>
    <script src="scripts/careerEngine.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
